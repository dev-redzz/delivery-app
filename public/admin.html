<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Gran Prime</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#E8621A;--orange-dark:#C04E10;--orange-light:#F07830;--orange-glow:rgba(232,98,26,.15);
  --cream:#F5EFE6;
  --black:#0C0C0C;--dark:#141414;--dark2:#1C1C1C;--dark3:#242424;--dark4:#2E2E2E;
  --gray:#7A7A7A;--gray-light:#ABABAB;--white:#FAFAF8;
  --sidebar:220px;--font-serif:'Cormorant Garamond',serif;--font-sans:'Plus Jakarta Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:var(--font-sans);min-height:100vh;display:flex;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;justify-content:center;z-index:1000;}
.login-box{background:var(--dark2);border:1px solid rgba(232,98,26,.2);border-radius:20px;padding:44px 36px;width:min(380px,90vw);text-align:center;}
.login-logo{font-family:var(--font-serif);font-size:26px;font-weight:700;color:var(--cream);margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.login-input{width:100%;padding:13px 15px;margin-bottom:11px;background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:11px;color:white;font-family:var(--font-sans);font-size:13.5px;outline:none;transition:border-color .2s;}
.login-input:focus{border-color:var(--orange);}
.login-btn{width:100%;padding:14px;background:var(--orange);border:none;border-radius:11px;color:white;font-family:var(--font-sans);font-size:14.5px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:6px;}
.login-btn:hover{background:var(--orange-light);}
.login-error{color:#f87171;font-size:12px;margin-top:10px;display:none;}

/* SIDEBAR */
#sidebar{width:var(--sidebar);min-height:100vh;background:var(--dark);border-right:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:50;transition:transform .3s;}
.sidebar-logo{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.05);}
.sidebar-logo-name{font-family:var(--font-serif);font-size:18px;font-weight:700;color:var(--cream);}
.sidebar-logo-sub{font-size:9px;color:var(--gray);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 16px;margin:2px 8px;border-radius:9px;color:var(--gray-light);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;text-decoration:none;}
.nav-item:hover{background:var(--dark2);color:white;}
.nav-item.active{background:var(--orange-glow);color:var(--orange-light);border:1px solid rgba(232,98,26,.25);}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.sidebar-bottom{margin-top:auto;padding:14px;border-top:1px solid rgba(255,255,255,.05);}
.logout-btn{width:100%;padding:9px;border-radius:9px;background:transparent;border:1px solid rgba(255,255,255,.08);color:var(--gray);font-family:var(--font-sans);font-size:12.5px;cursor:pointer;transition:all .2s;}
.logout-btn:hover{border-color:#f87171;color:#f87171;}

/* MAIN */
#admin-main{margin-left:var(--sidebar);flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:rgba(12,12,12,.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.topbar-title{font-family:var(--font-serif);font-size:18px;color:var(--cream);}
.view-site-btn{padding:7px 14px;border-radius:8px;background:var(--orange-glow);border:1px solid rgba(232,98,26,.3);color:var(--orange-light);font-family:var(--font-sans);font-size:12px;cursor:pointer;text-decoration:none;transition:all .2s;}
.view-site-btn:hover{background:rgba(232,98,26,.25);}
.page-content{padding:24px;flex:1;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--dark2);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:18px;}
.stat-icon{font-size:22px;margin-bottom:8px;}
.stat-value{font-family:var(--font-serif);font-size:26px;font-weight:700;color:var(--orange-light);}
.stat-label{font-size:11.5px;color:var(--gray);margin-top:3px;}

/* CARDS */
.section-card{background:var(--dark2);border:1px solid rgba(255,255,255,.05);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.section-head{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;}
.section-head h3{font-size:14.5px;font-weight:600;color:var(--cream);}
.btn-primary{padding:8px 15px;border-radius:9px;background:var(--orange);border:none;color:white;font-family:var(--font-sans);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;}
.btn-primary:hover{background:var(--orange-light);}
.btn-sm{padding:5px 9px;font-size:11.5px;border-radius:7px;}
.btn-danger{background:#7f1d1d;border:none;}
.btn-danger:hover{background:#991b1b;}
.btn-secondary{background:var(--dark3);border:1px solid rgba(255,255,255,.08);color:var(--gray-light);}
.btn-secondary:hover{border-color:var(--orange);color:var(--orange-light);}

/* TABLE */
table{width:100%;border-collapse:collapse;}
th{padding:9px 15px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gray);border-bottom:1px solid rgba(255,255,255,.05);}
td{padding:11px 15px;font-size:12.5px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.015);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:16px;font-size:11px;font-weight:600;}
.badge-green{background:rgba(74,222,128,.12);color:#4ade80;}
.badge-red{background:rgba(248,113,113,.12);color:#f87171;}
.badge-orange{background:var(--orange-glow);color:var(--orange-light);}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;padding:16px;}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--dark2);border:1px solid rgba(255,255,255,.08);border-radius:18px;width:min(500px,100%);max-height:90vh;overflow-y:auto;padding:26px;transform:translateY(16px);transition:transform .3s;}
.modal-backdrop.open .modal-box{transform:translateY(0);}
.modal-title{font-family:var(--font-serif);font-size:20px;color:var(--cream);margin-bottom:22px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray);margin-bottom:5px;}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 13px;background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:white;font-family:var(--font-sans);font-size:13.5px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--orange);}
.form-textarea{resize:vertical;min-height:76px;}
.form-select option{background:var(--dark3);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;}
.toggle-wrap{display:flex;align-items:center;gap:9px;}
.toggle{width:42px;height:22px;border-radius:11px;background:var(--dark3);border:1px solid rgba(255,255,255,.1);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--orange);}
.toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:white;transition:left .2s;}
.toggle.on .toggle-knob{left:22px;}
.img-preview{width:76px;height:76px;border-radius:9px;object-fit:cover;margin-top:7px;display:none;border:1px solid rgba(232,98,26,.3);}

/* SETTINGS GRID */
.settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}

/* MOBILE */
.menu-toggle{display:none;background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:8px;}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  #admin-main{margin-left:0;}
  .topbar{padding:0 14px;}
  .page-content{padding:14px;}
  .form-row{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .menu-toggle{display:block;}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🔥 Gran Prime</div>
    <div class="login-sub">Painel Administrativo</div>
    <input class="login-input" id="login-email" type="email" placeholder="E-mail" value="admin@brasa.com">
    <input class="login-input" id="login-pass" type="password" placeholder="Senha" value="admin123">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Credenciais inválidas</div>
  </div>
</div>

<nav id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-name">Gran Prime</div>
    <div class="sidebar-logo-sub">Painel Admin</div>
  </div>
  <div style="padding:10px 0;flex:1">
    <a class="nav-item active" onclick="showPage('dashboard',this)"><span class="nav-icon">📊</span>Dashboard</a>
    <a class="nav-item" onclick="showPage('products',this)"><span class="nav-icon">🍽️</span>Produtos</a>
    <a class="nav-item" onclick="showPage('categories',this)"><span class="nav-icon">📂</span>Categorias</a>
    <a class="nav-item" onclick="showPage('banners',this)"><span class="nav-icon">🎯</span>Banners</a>
    <a class="nav-item" onclick="showPage('orders',this)"><span class="nav-icon">📋</span>Pedidos</a>
    <a class="nav-item" onclick="showPage('settings',this)"><span class="nav-icon">⚙️</span>Configurações</a>
  </div>
  <div class="sidebar-bottom">
    <button class="logout-btn" onclick="logout()">🚪 Sair</button>
  </div>
</nav>

<div id="admin-main" style="display:none">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title" id="page-title">Dashboard</span>
    </div>
    <a href="/" target="_blank" class="view-site-btn">🌐 Ver Site</a>
  </div>
  <div class="page-content" id="page-content"></div>
</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="closeModalBackdrop(event)">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
let token=localStorage.getItem('admin_token');
let editingId=null;

async function doLogin(){
  const email=document.getElementById('login-email').value;
  const pass=document.getElementById('login-pass').value;
  try{
    const res=await api('/auth/login','POST',{email,password:pass},false);
    token=res.token;localStorage.setItem('admin_token',token);
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-main').style.cssText='display:flex;flex-direction:column';
    showPage('dashboard',document.querySelector('.nav-item'));
  }catch{document.getElementById('login-error').style.display='block';}
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
});
function logout(){localStorage.removeItem('admin_token');token=null;location.reload();}

async function api(path,method='GET',body=null,auth=true){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(auth)opts.headers['Authorization']='Bearer '+token;
  if(body&&!(body instanceof FormData))opts.body=JSON.stringify(body);
  if(body instanceof FormData){delete opts.headers['Content-Type'];opts.body=body;}
  const res=await fetch('/api'+path,opts);
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

const pageTitles={dashboard:'📊 Dashboard',products:'🍽️ Produtos',categories:'📂 Categorias',banners:'🎯 Banners',orders:'📋 Pedidos',settings:'⚙️ Configurações'};

function showPage(page,el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el)el.classList.add('active');
  document.getElementById('page-title').textContent=pageTitles[page];
  pages[page]();
  if(window.innerWidth<768)document.getElementById('sidebar').classList.remove('open');
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
function openModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-backdrop').classList.add('open');}
function closeModal(){document.getElementById('modal-backdrop').classList.remove('open');editingId=null;}
function closeModalBackdrop(e){if(e.target===document.getElementById('modal-backdrop'))closeModal();}

const pages={
  dashboard:async()=>{
    const[products,orders,cats,banners]=await Promise.all([api('/admin/products'),api('/admin/orders'),api('/admin/categories'),api('/admin/banners')]);
    const today=new Date().toISOString().slice(0,10);
    const todayO=orders.filter(o=>o.created_at&&o.created_at.startsWith(today));
    const todayT=todayO.reduce((a,o)=>a+(o.total||0),0);
    document.getElementById('page-content').innerHTML=`
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">🍽️</div><div class="stat-value">${products.length}</div><div class="stat-label">Produtos</div></div>
        <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-value">${orders.length}</div><div class="stat-label">Pedidos Total</div></div>
        <div class="stat-card"><div class="stat-icon">🚀</div><div class="stat-value">${todayO.length}</div><div class="stat-label">Pedidos Hoje</div></div>
        <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">R$${todayT.toFixed(2).replace('.',',')}</div><div class="stat-label">Faturamento Hoje</div></div>
      </div>
      <div class="section-card">
        <div class="section-head"><h3>📋 Últimos Pedidos</h3></div>
        <table><thead><tr><th>Cliente</th><th>Telefone</th><th>Total</th><th>Tipo</th><th>Pagamento</th><th>Status</th><th>Hora</th></tr></thead>
        <tbody>${orders.slice(0,10).map(o=>`<tr>
          <td>${o.customer_name||'—'}</td><td>${o.customer_phone||'—'}</td>
          <td><b style="color:var(--orange-light)">R$${parseFloat(o.total||0).toFixed(2).replace('.',',')}</b></td>
          <td>${o.delivery_type==='delivery'?'🛵 Entrega':'🏪 Retirada'}</td>
          <td>{{credit:'💳 Crédito',debit:'💳 Débito',pix:'📱 Pix',cash:'💵 Dinheiro'}[o.payment_method]||o.payment_method||'—'}</td>
          <td><span class="badge ${o.status==='done'?'badge-green':o.status==='cancelled'?'badge-red':'badge-orange'}">${o.status||'pending'}</span></td>
          <td style="color:var(--gray);font-size:11px">${o.created_at?new Date(o.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'—'}</td>
        </tr>`).join('')||'<tr><td colspan="7" style="text-align:center;color:var(--gray);padding:20px">Nenhum pedido</td></tr>'}
        </tbody></table>
      </div>`;
    // fix template literal issue
    document.querySelectorAll('td').forEach(td=>{if(td.textContent.startsWith('{{'))td.textContent='—';});
  },

  products:async()=>{
    const[products,cats,subcats]=await Promise.all([api('/admin/products'),api('/admin/categories'),api('/admin/subcategories')]);
    document.getElementById('page-content').innerHTML=`
      <div class="section-card">
        <div class="section-head"><h3>🍽️ Produtos (${products.length})</h3><button class="btn-primary" onclick="openProductModal(null)">+ Novo</button></div>
        <table><thead><tr><th>Img</th><th>Nome</th><th>Categoria</th><th>Preço</th><th>Pizza</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody>${products.map(p=>`<tr>
          <td>${p.image?`<img src="${p.image}" style="width:38px;height:38px;border-radius:7px;object-fit:cover">`:'🍽️'}</td>
          <td><b>${p.name}</b><br><span style="font-size:11px;color:var(--gray)">${(p.description||'').slice(0,38)}${(p.description||'').length>38?'...':''}</span></td>
          <td>${p.category_name||'—'}${p.subcategory_name?`<br><span style="font-size:11px;color:var(--gray)">${p.subcategory_name}</span>`:''}</td>
          <td><b style="color:var(--orange-light)">R$${parseFloat(p.price).toFixed(2).replace('.',',')}</b></td>
          <td>${p.has_half_half?'✅':'—'}</td>
          <td><span class="badge ${p.active?'badge-green':'badge-red'}">${p.active?'Ativo':'Inativo'}</span></td>
          <td style="display:flex;gap:5px">
            <button class="btn-primary btn-sm" onclick="openProductModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">✏️</button>
            <button class="btn-primary btn-sm btn-danger" onclick="deleteProduct(${p.id})">🗑</button>
          </td>
        </tr>`).join('')||'<tr><td colspan="7" style="text-align:center;color:var(--gray);padding:20px">Nenhum produto</td></tr>'}
        </tbody></table>
      </div>`;
  },

  categories:async()=>{
    const[cats,subcats]=await Promise.all([api('/admin/categories'),api('/admin/subcategories')]);
    document.getElementById('page-content').innerHTML=`
      <div class="section-card" style="margin-bottom:18px">
        <div class="section-head"><h3>📂 Categorias</h3><button class="btn-primary" onclick="openCategoryModal(null)">+ Nova</button></div>
        <table><thead><tr><th>Ícone</th><th>Nome</th><th>Slug</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody>${cats.map(c=>`<tr>
          <td style="font-size:18px">${c.icon||'📁'}</td><td><b>${c.name}</b></td>
          <td style="color:var(--gray);font-size:11.5px">${c.slug}</td>
          <td><span class="badge ${c.active?'badge-green':'badge-red'}">${c.active?'Ativo':'Inativo'}</span></td>
          <td style="display:flex;gap:5px">
            <button class="btn-primary btn-sm" onclick="openCategoryModal(${JSON.stringify(c).replace(/"/g,'&quot;')})">✏️</button>
            <button class="btn-primary btn-sm btn-danger" onclick="deleteCategory(${c.id})">🗑</button>
          </td></tr>`).join('')}
        </tbody></table>
      </div>
      <div class="section-card">
        <div class="section-head"><h3>📁 Subcategorias</h3><button class="btn-primary" onclick="openSubcategoryModal(null)">+ Nova</button></div>
        <table><thead><tr><th>Nome</th><th>Categoria Pai</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody>${subcats.map(s=>`<tr>
          <td><b>${s.name}</b></td><td>${s.category_name||'—'}</td>
          <td><span class="badge ${s.active?'badge-green':'badge-red'}">${s.active?'Ativo':'Inativo'}</span></td>
          <td style="display:flex;gap:5px">
            <button class="btn-primary btn-sm" onclick="openSubcategoryModal(${JSON.stringify(s).replace(/"/g,'&quot;')})">✏️</button>
            <button class="btn-primary btn-sm btn-danger" onclick="deleteSubcategory(${s.id})">🗑</button>
          </td></tr>`).join('')||'<tr><td colspan="4" style="text-align:center;color:var(--gray);padding:20px">Nenhuma subcategoria</td></tr>'}
        </tbody></table>
      </div>`;
  },

  banners:async()=>{
    const banners=await api('/admin/banners');
    document.getElementById('page-content').innerHTML=`
      <div class="section-card">
        <div class="section-head"><h3>🎯 Banners</h3><button class="btn-primary" onclick="openBannerModal(null)">+ Novo</button></div>
        <table><thead><tr><th>Preview</th><th>Título</th><th>Subtítulo</th><th>Badge</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody>${banners.map(b=>`<tr>
          <td>${b.image?`<img src="${b.image}" style="width:80px;height:38px;object-fit:cover;border-radius:7px">`:`<div style="width:80px;height:38px;border-radius:7px;background:linear-gradient(135deg,${b.color_from},${b.color_to});display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${b.badge||''}</div>`}</td>
          <td><b>${b.title}</b></td>
          <td style="color:var(--gray);font-size:11.5px">${(b.subtitle||'').slice(0,36)}</td>
          <td>${b.badge||'—'}</td>
          <td><span class="badge ${b.active?'badge-green':'badge-red'}">${b.active?'Ativo':'Inativo'}</span></td>
          <td style="display:flex;gap:5px">
            <button class="btn-primary btn-sm" onclick="openBannerModal(${JSON.stringify(b).replace(/"/g,'&quot;')})">✏️</button>
            <button class="btn-primary btn-sm btn-danger" onclick="deleteBanner(${b.id})">🗑</button>
          </td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--gray);padding:20px">Nenhum banner</td></tr>'}
        </tbody></table>
      </div>`;
  },

  orders:async()=>{
    const orders=await api('/admin/orders');
    document.getElementById('page-content').innerHTML=`
      <div class="section-card">
        <div class="section-head"><h3>📋 Pedidos (${orders.length})</h3></div>
        <table><thead><tr><th>#</th><th>Cliente</th><th>Itens</th><th>Total</th><th>Tipo</th><th>Pgto</th><th>Status</th><th>Data</th><th>Endereço</th></tr></thead>
        <tbody>${orders.map(o=>{
          const items=Array.isArray(o.items)?o.items:[];
          return`<tr>
            <td style="color:var(--gray)">#${o.id}</td>
            <td><b>${o.customer_name||'—'}</b><br><span style="font-size:11px;color:var(--gray)">${o.customer_phone||''}</span></td>
            <td style="font-size:11.5px;color:var(--gray-light);max-width:160px">${items.slice(0,3).map(i=>`${i.qty||1}x ${i.name}`).join('<br>')}${items.length>3?'...':''}</td>
            <td><b style="color:var(--orange-light)">R$${parseFloat(o.total||0).toFixed(2).replace('.',',')}</b></td>
            <td>${o.delivery_type==='delivery'?'🛵':'🏪'}</td>
            <td style="font-size:11.5px">${{credit:'Crédito',debit:'Débito',pix:'Pix',cash:'Dinheiro'}[o.payment_method]||'—'}</td>
            <td><select onchange="updateOrderStatus(${o.id},this.value)" style="background:var(--dark3);color:white;border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:4px 7px;font-size:11.5px;cursor:pointer">
              ${['pending','preparing','ready','delivered','cancelled'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${{pending:'⏳ Aguardando',preparing:'👨‍🍳 Preparando',ready:'✅ Pronto',delivered:'🚀 Entregue',cancelled:'❌ Cancelado'}[s]}</option>`).join('')}
            </select></td>
            <td style="font-size:11px;color:var(--gray)">${o.created_at?new Date(o.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—'}</td>
            <td style="font-size:11px;color:var(--gray)">${o.address_street?`${o.address_street},${o.address_number||''} - ${o.address_neighborhood||''}`:'—'}</td>
          </tr>`;}).join('')||'<tr><td colspan="9" style="text-align:center;color:var(--gray);padding:20px">Nenhum pedido</td></tr>'}
        </tbody></table>
      </div>`;
  },

  settings:async()=>{
    const s=await api('/admin/settings');
    document.getElementById('page-content').innerHTML=`
      <div class="section-card">
        <div class="section-head"><h3>⚙️ Configurações Gerais</h3></div>
        <div style="padding:22px">
          <div class="settings-grid">
            <div class="form-group" style="grid-column:1/-1">
              <label class="form-label">Logo do Restaurante</label>
              <input class="form-input" id="s-logo-file" type="file" accept="image/*" onchange="previewLogo(this)" style="padding:9px">
              <div style="margin-top:9px;display:flex;align-items:center;gap:12px">
                ${s.logo_url?`<img src="${s.logo_url}" style="width:56px;height:56px;border-radius:11px;object-fit:cover;border:1px solid rgba(232,98,26,.3)">`:''}
                <div id="logo-preview-wrap"></div>
                <div style="font-size:11px;color:var(--gray)">Recomendado: imagem quadrada, mín. 200×200px</div>
              </div>
            </div>
            <div class="form-group"><label class="form-label">Nome do Restaurante</label><input class="form-input" id="s-name" value="${s.restaurant_name||'Gran Prime'}"></div>
            <div class="form-group"><label class="form-label">WhatsApp (com código do país)</label><input class="form-input" id="s-whatsapp" value="${s.whatsapp||''}" placeholder="5598912345678"></div>
            <div class="form-group"><label class="form-label">Horário de Funcionamento</label><input class="form-input" id="s-hours" value="${s.open_hours||''}" placeholder="18:00 - 23:00"></div>
            <div class="form-group"><label class="form-label">Taxa de Entrega (R$)</label><input class="form-input" id="s-fee" type="number" step="0.50" min="0" value="${s.delivery_fee||'0'}"></div>
            <div class="form-group"><label class="form-label">Pedido Mínimo (R$)</label><input class="form-input" id="s-min" type="number" value="${s.min_order||''}"></div>
            <div class="form-group"><label class="form-label">Endereço</label><input class="form-input" id="s-address" value="${s.address||''}"></div>
            <div class="form-group">
              <label class="form-label">Status da Loja</label>
              <div class="toggle-wrap" style="margin-top:8px">
                <div class="toggle ${s.open==='1'?'on':''}" id="open-toggle" onclick="this.classList.toggle('on')"><div class="toggle-knob"></div></div>
                <span id="open-label">${s.open==='1'?'🟢 Aberto':'🔴 Fechado'}</span>
              </div>
            </div>
          </div>
          <button class="btn-primary" onclick="saveSettings()" style="margin-top:6px">💾 Salvar Configurações</button>
        </div>
      </div>`;
  }
};

// SETTINGS
function previewLogo(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{const w=document.getElementById('logo-preview-wrap');w.innerHTML=`<img src="${e.target.result}" style="width:56px;height:56px;border-radius:11px;object-fit:cover;border:2px solid var(--orange)">`};
  reader.readAsDataURL(file);
}
async function saveSettings(){
  const open=document.getElementById('open-toggle').classList.contains('on');
  let logoUrl=null;
  const lf=document.getElementById('s-logo-file')?.files[0];
  if(lf){const fd=new FormData();fd.append('image',lf);const r=await fetch('/api/admin/upload',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd});if(r.ok){const d=await r.json();logoUrl=d.url;}}
  const body={restaurant_name:document.getElementById('s-name').value,whatsapp:document.getElementById('s-whatsapp').value,open_hours:document.getElementById('s-hours').value,delivery_fee:document.getElementById('s-fee').value,min_order:document.getElementById('s-min').value,address:document.getElementById('s-address').value,open:open?'1':'0'};
  if(logoUrl)body.logo_url=logoUrl;
  await api('/admin/settings','PUT',body);
  alert('✅ Configurações salvas!');
}

// PRODUCTS
async function openProductModal(p){
  editingId=p?.id||null;
  const[cats,subcats]=await Promise.all([api('/admin/categories'),api('/admin/subcategories')]);
  let sp={P:'',M:'',G:'',GG:'',F:''};
  if(p?.sizes_prices){try{sp={...sp,...JSON.parse(p.sizes_prices)};}catch(e){}}
  else if(p?.price&&p?.has_half_half){sp={P:(p.price*.70).toFixed(2),M:(p.price*.85).toFixed(2),G:(p.price*1.00).toFixed(2),GG:(p.price*1.20).toFixed(2),F:(p.price*1.45).toFixed(2)};}
  const isPizza=p?.has_half_half;
  openModal(`<div class="modal-title">${p?'✏️ Editar Produto':'➕ Novo Produto'}</div>
    <div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="p-name" value="${p?.name||''}"></div>
    <div class="form-group"><label class="form-label">Descrição</label><textarea class="form-textarea" id="p-desc">${p?.description||''}</textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Preço Base (R$)</label><input class="form-input" id="p-price" type="number" step="0.01" value="${p?.price||''}"></div>
      <div class="form-group"><label class="form-label">Ordem</label><input class="form-input" id="p-order" type="number" value="${p?.sort_order||0}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Categoria</label>
        <select class="form-select" id="p-cat" onchange="filterSubcats(this.value);toggleSizeFields(this)">
          ${cats.map(c=>`<option value="${c.id}" ${p?.category_id==c.id?'selected':''}>${c.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Subcategoria</label>
        <select class="form-select" id="p-subcat">
          <option value="">Nenhuma</option>
          ${subcats.filter(s=>!p||s.category_id==p.category_id).map(s=>`<option value="${s.id}" ${p?.subcategory_id==s.id?'selected':''}>${s.name}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="toggle-wrap" style="margin-bottom:14px">
      <div class="toggle ${isPizza?'on':''}" id="t-half" onclick="this.classList.toggle('on');updateSizeVisibility()"><div class="toggle-knob"></div></div>
      <span>🍕 Pizza com tamanhos (P/M/G/GG/F)</span>
    </div>
    <div id="sizes-fields" style="display:${isPizza?'block':'none'};margin-bottom:18px;background:var(--dark3);border-radius:11px;padding:14px;border:1px solid rgba(232,98,26,.2)">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:12px">💰 Preços por Tamanho (R$)</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
        ${['P','M','G','GG','F'].map(s=>`<div><label style="font-size:10px;color:var(--gray);display:block;text-align:center;margin-bottom:5px;font-weight:700">${s}</label><input class="form-input" id="sp-${s}" type="number" step="0.01" min="0" value="${sp[s]||''}" placeholder="0,00" style="text-align:center;padding:9px 4px;font-size:13px;font-weight:600"></div>`).join('')}
      </div>
      <div style="font-size:10.5px;color:var(--gray);margin-top:9px">P=4 · M=6 · G=8 · GG=10 · F=12 fatias</div>
    </div>
    <div class="form-group"><label class="form-label">Imagem</label>
      <input class="form-input" id="p-img" type="file" accept="image/*" onchange="previewImg(this)" style="padding:9px">
      ${p?.image?`<img id="img-preview" src="${p.image}" class="img-preview" style="display:block">`:'<img id="img-preview" class="img-preview">'}
    </div>
    <div class="toggle-wrap" style="margin-bottom:14px">
      <div class="toggle ${p?.active!==0?'on':''}" id="t-active" onclick="this.classList.toggle('on')"><div class="toggle-knob"></div></div>
      <span>Produto Ativo</span>
    </div>
    <div class="modal-footer">
      <button class="btn-primary btn-sm btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveProduct()">💾 Salvar</button>
    </div>`);
}
function updateSizeVisibility(){const sf=document.getElementById('sizes-fields');if(sf)sf.style.display=document.getElementById('t-half')?.classList.contains('on')?'block':'none';}
function filterSubcats(catId){api('/admin/subcategories').then(subcats=>{const sel=document.getElementById('p-subcat');sel.innerHTML='<option value="">Nenhuma</option>'+subcats.filter(s=>s.category_id==catId).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');});}
function toggleSizeFields(sel){const n=sel.options[sel.selectedIndex]?.text||'';if(n.toLowerCase().includes('pizza')){document.getElementById('t-half')?.classList.add('on');updateSizeVisibility();}}
function previewImg(input){const file=input.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{const img=document.getElementById('img-preview');img.src=e.target.result;img.style.display='block';};r.readAsDataURL(file);}
async function saveProduct(){
  const isHalf=document.getElementById('t-half').classList.contains('on');
  const fd=new FormData();
  fd.append('name',document.getElementById('p-name').value);
  fd.append('description',document.getElementById('p-desc').value);
  fd.append('price',document.getElementById('p-price').value);
  fd.append('category_id',document.getElementById('p-cat').value);
  fd.append('subcategory_id',document.getElementById('p-subcat').value);
  fd.append('sort_order',document.getElementById('p-order').value);
  fd.append('has_half_half',isHalf?'1':'0');
  fd.append('active',document.getElementById('t-active').classList.contains('on')?'1':'0');
  if(isHalf){const sizes={};let hasAny=false;for(const s of['P','M','G','GG','F']){const v=document.getElementById(`sp-${s}`)?.value;if(v&&parseFloat(v)>0){sizes[s]=parseFloat(parseFloat(v).toFixed(2));hasAny=true;}}if(hasAny){fd.append('sizes_prices',JSON.stringify(sizes));const g=document.getElementById('sp-G')?.value;if(g&&parseFloat(g)>0)fd.set('price',g);}}
  const imgFile=document.getElementById('p-img').files[0];if(imgFile)fd.append('image',imgFile);
  const method=editingId?'PUT':'POST';const path=editingId?`/admin/products/${editingId}`:'/admin/products';
  const res=await fetch('/api'+path,{method,headers:{Authorization:'Bearer '+token},body:fd});
  if(res.ok){closeModal();pages.products();}
}
async function deleteProduct(id){if(!confirm('Excluir este produto?'))return;await api(`/admin/products/${id}`,'DELETE');pages.products();}

// CATEGORIES
function openCategoryModal(c){
  editingId=c?.id||null;
  openModal(`<div class="modal-title">${c?'✏️ Editar Categoria':'➕ Nova Categoria'}</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="c-name" value="${c?.name||''}"></div>
      <div class="form-group"><label class="form-label">Ícone (emoji)</label><input class="form-input" id="c-icon" value="${c?.icon||''}" placeholder="🍕"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Slug</label><input class="form-input" id="c-slug" value="${c?.slug||''}" placeholder="pizzas"></div>
      <div class="form-group"><label class="form-label">Ordem</label><input class="form-input" id="c-order" type="number" value="${c?.sort_order||0}"></div>
    </div>
    <div class="toggle-wrap" style="margin-bottom:14px"><div class="toggle ${c?.active!==0?'on':''}" id="c-active" onclick="this.classList.toggle('on')"><div class="toggle-knob"></div></div><span>Ativo</span></div>
    <div class="modal-footer"><button class="btn-primary btn-sm btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="saveCategory()">💾 Salvar</button></div>`);
}
async function saveCategory(){const body={name:document.getElementById('c-name').value,slug:document.getElementById('c-slug').value,icon:document.getElementById('c-icon').value,sort_order:document.getElementById('c-order').value,active:document.getElementById('c-active').classList.contains('on')};await api(editingId?`/admin/categories/${editingId}`:'/admin/categories',editingId?'PUT':'POST',body);closeModal();pages.categories();}
async function deleteCategory(id){if(!confirm('Excluir?'))return;await api(`/admin/categories/${id}`,'DELETE');pages.categories();}

// SUBCATEGORIES
async function openSubcategoryModal(s){
  editingId=s?.id||null;const cats=await api('/admin/categories');
  openModal(`<div class="modal-title">${s?'✏️ Editar Subcategoria':'➕ Nova Subcategoria'}</div>
    <div class="form-group"><label class="form-label">Categoria Pai</label>
      <select class="form-select" id="sc-cat">${cats.map(c=>`<option value="${c.id}" ${s?.category_id==c.id?'selected':''}>${c.name}</option>`).join('')}</select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="sc-name" value="${s?.name||''}"></div>
      <div class="form-group"><label class="form-label">Slug</label><input class="form-input" id="sc-slug" value="${s?.slug||''}"></div>
    </div>
    <div class="form-group"><label class="form-label">Ordem</label><input class="form-input" id="sc-order" type="number" value="${s?.sort_order||0}"></div>
    <div class="toggle-wrap" style="margin-bottom:14px"><div class="toggle ${s?.active!==0?'on':''}" id="sc-active" onclick="this.classList.toggle('on')"><div class="toggle-knob"></div></div><span>Ativo</span></div>
    <div class="modal-footer"><button class="btn-primary btn-sm btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="saveSubcategory()">💾 Salvar</button></div>`);
}
async function saveSubcategory(){const body={category_id:document.getElementById('sc-cat').value,name:document.getElementById('sc-name').value,slug:document.getElementById('sc-slug').value,sort_order:document.getElementById('sc-order').value,active:document.getElementById('sc-active').classList.contains('on')};await api(editingId?`/admin/subcategories/${editingId}`:'/admin/subcategories',editingId?'PUT':'POST',body);closeModal();pages.categories();}
async function deleteSubcategory(id){if(!confirm('Excluir?'))return;await api(`/admin/subcategories/${id}`,'DELETE');pages.categories();}

// BANNERS
function openBannerModal(b){
  editingId=b?.id||null;
  openModal(`<div class="modal-title">${b?'✏️ Editar Banner':'➕ Novo Banner'}</div>
    <div class="form-group"><label class="form-label">Título</label><input class="form-input" id="b-title" value="${b?.title||''}"></div>
    <div class="form-group"><label class="form-label">Subtítulo</label><input class="form-input" id="b-sub" value="${b?.subtitle||''}"></div>
    <div class="form-group"><label class="form-label">Badge (emoji + texto)</label><input class="form-input" id="b-badge" value="${b?.badge||''}" placeholder="🔥 Promoção"></div>
    <div class="form-group">
      <label class="form-label">Imagem do Banner (opcional)</label>
      <input class="form-input" id="b-img" type="file" accept="image/*" onchange="previewBannerImg(this)" style="padding:9px">
      ${b?.image?`<img id="b-img-preview" src="${b.image}" style="width:100%;height:72px;object-fit:cover;border-radius:9px;margin-top:7px">`:'<img id="b-img-preview" style="display:none;width:100%;height:72px;object-fit:cover;border-radius:9px;margin-top:7px">'}
      <div style="font-size:10.5px;color:var(--gray);margin-top:5px">Se enviar imagem, ela fica como fundo do banner</div>
    </div>
    <div style="font-size:10.5px;color:var(--gray);margin-bottom:8px">Cores de fundo (quando não há imagem):</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Cor Início</label><input class="form-input" id="b-cf" type="color" value="${b?.color_from||'#8B2E0E'}" style="height:42px;cursor:pointer"></div>
      <div class="form-group"><label class="form-label">Cor Fim</label><input class="form-input" id="b-ct" type="color" value="${b?.color_to||'#E8621A'}" style="height:42px;cursor:pointer"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Ordem</label><input class="form-input" id="b-order" type="number" value="${b?.sort_order||0}"></div>
      <div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:2px">
        <div class="toggle-wrap"><div class="toggle ${b?.active!==0?'on':''}" id="b-active" onclick="this.classList.toggle('on')"><div class="toggle-knob"></div></div><span>Ativo</span></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn-primary btn-sm btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="saveBanner()">💾 Salvar</button></div>`);
}
function previewBannerImg(input){const file=input.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{const img=document.getElementById('b-img-preview');img.src=e.target.result;img.style.display='block';};r.readAsDataURL(file);}
async function saveBanner(){
  const fd=new FormData();
  fd.append('title',document.getElementById('b-title').value);
  fd.append('subtitle',document.getElementById('b-sub').value);
  fd.append('badge',document.getElementById('b-badge').value);
  fd.append('color_from',document.getElementById('b-cf').value);
  fd.append('color_to',document.getElementById('b-ct').value);
  fd.append('sort_order',document.getElementById('b-order').value);
  fd.append('active',document.getElementById('b-active').classList.contains('on')?'1':'0');
  const imgFile=document.getElementById('b-img').files[0];if(imgFile)fd.append('image',imgFile);
  const path=editingId?`/admin/banners/${editingId}`:'/admin/banners';
  const res=await fetch('/api'+path,{method:editingId?'PUT':'POST',headers:{Authorization:'Bearer '+token},body:fd});
  if(res.ok){closeModal();pages.banners();}
}
async function deleteBanner(id){if(!confirm('Excluir banner?'))return;await api(`/admin/banners/${id}`,'DELETE');pages.banners();}
async function updateOrderStatus(id,status){await api(`/admin/orders/${id}/status`,'PUT',{status});}

// AUTO LOGIN
if(token){
  fetch('/api/admin/settings',{headers:{Authorization:'Bearer '+token}}).then(r=>{
    if(r.ok){document.getElementById('login-screen').style.display='none';document.getElementById('admin-main').style.cssText='display:flex;flex-direction:column';showPage('dashboard',document.querySelector('.nav-item'));}
    else{localStorage.removeItem('admin_token');token=null;}
  }).catch(()=>{});
}
</script>
</body>
</html>
